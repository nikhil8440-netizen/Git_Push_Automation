<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D7BFF"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#3B2FB0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.22" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1e1b4b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- app squircle -->
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#glow)"/>

  <!-- subtle auto-sync ring (it watches and re-runs on its own) -->
  <circle cx="512" cy="500" r="262" fill="none" stroke="#ffffff" stroke-opacity="0.30"
          stroke-width="30" stroke-linecap="round" stroke-dasharray="1230 416" transform="rotate(125 512 500)"/>

  <!-- push-up arrow (your commits, sent up) -->
  <g filter="url(#soft)" fill="#ffffff">
    <rect x="474" y="430" width="76" height="300" rx="34"/>
    <path d="M512 286 L666 474 q14 17 -8 17 H354 q-22 0 -8 -17 Z"/>
    <!-- ground line: pushed up from your local folder -->
    <rect x="392" y="772" width="240" height="58" rx="29"/>
  </g>

  <!-- git commit nodes riding the line -->
  <circle cx="512" cy="556" r="31" fill="#4F46E5"/>
  <circle cx="512" cy="556" r="14" fill="#ffffff"/>
  <circle cx="512" cy="672" r="25" fill="#4F46E5"/>
  <circle cx="512" cy="672" r="11" fill="#ffffff"/>
</svg>
